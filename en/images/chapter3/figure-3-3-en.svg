<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 368">
  <style>
    text { font-family: 'Courier New', 'Courier', monospace; text-anchor: middle; fill: #1a2f5e; }
    .title { font-size: 16px; font-weight: bold; }
    .char { font-size: 18px; font-weight: bold; }
    .frac { font-size: 10px; fill-opacity: 0.75; }
    .idx { font-size: 13px; }
    .seglabel { font-size: 13px; font-weight: bold; }
    .label { font-size: 13px; }
    .dots { font-size: 18px; font-weight: bold; }
    .caption { font-size: 12px; opacity: 0.88; }
    .box { fill: #ffffff; stroke: #1a2f5e; stroke-width: 1.5; stroke-opacity: 0.5; }
    .selected { fill: #1a2f5e; fill-opacity: 0.10; stroke-opacity: 0.9; stroke-width: 2.5; }
    .seg { fill: #1a2f5e; fill-opacity: 0.10; stroke: #1a2f5e; stroke-width: 1.5; stroke-opacity: 0.5; }
    .target { fill: none; stroke: #1a2f5e; stroke-width: 1.6; stroke-opacity: 0.7; stroke-dasharray: 5 4; }
    .frame { fill: none; stroke: #1a2f5e; stroke-opacity: 0.2; }
    .bracket { fill: none; stroke: #1a2f5e; stroke-width: 1.6; stroke-opacity: 0.7; }
  </style>
  <rect width="800" height="368" fill="#ffffff" />
  <rect x="1" y="1" width="798" height="366" rx="6" class="frame" />
  <text x="400" y="36" class="title">Building 0.1 in Binary</text>

  <!-- Place values above the digit boxes -->
  <text x="218" y="76" class="frac">1/2</text>
  <text x="258" y="76" class="frac">1/4</text>
  <text x="298" y="76" class="frac">1/8</text>
  <text x="338" y="76" class="frac">1/16</text>
  <text x="378" y="76" class="frac">1/32</text>
  <text x="418" y="76" class="frac">1/64</text>
  <text x="458" y="76" class="frac">1/128</text>
  <text x="498" y="76" class="frac">1/256</text>
  <text x="538" y="76" class="frac">1/512</text>

  <!-- The binary digits of 0.1 -->
  <text x="184" y="117" class="char">0.</text>
  <g transform="translate(200, 88)"><rect width="36" height="44" rx="3" class="box" /><text x="18" y="29" class="char">0</text></g>
  <g transform="translate(240, 88)"><rect width="36" height="44" rx="3" class="box" /><text x="18" y="29" class="char">0</text></g>
  <g transform="translate(280, 88)"><rect width="36" height="44" rx="3" class="box" /><text x="18" y="29" class="char">0</text></g>
  <g transform="translate(320, 88)"><rect width="36" height="44" rx="3" class="box selected" /><text x="18" y="29" class="char">1</text></g>
  <g transform="translate(360, 88)"><rect width="36" height="44" rx="3" class="box selected" /><text x="18" y="29" class="char">1</text></g>
  <g transform="translate(400, 88)"><rect width="36" height="44" rx="3" class="box" /><text x="18" y="29" class="char">0</text></g>
  <g transform="translate(440, 88)"><rect width="36" height="44" rx="3" class="box" /><text x="18" y="29" class="char">0</text></g>
  <g transform="translate(480, 88)"><rect width="36" height="44" rx="3" class="box selected" /><text x="18" y="29" class="char">1</text></g>
  <g transform="translate(520, 88)"><rect width="36" height="44" rx="3" class="box selected" /><text x="18" y="29" class="char">1</text></g>
  <text x="580" y="117" class="dots">...</text>

  <!-- The pieces summed toward 0.1 -->
  <text x="80" y="180" class="idx">0</text>
  <rect x="80" y="190" width="400" height="32" class="seg" />
  <text x="280" y="211" class="seglabel">1/16</text>
  <rect x="480" y="190" width="200" height="32" class="seg" />
  <text x="580" y="211" class="seglabel">1/32</text>
  <rect x="680" y="190" width="25" height="32" class="seg" />
  <rect x="705" y="190" width="12.5" height="32" class="seg" />
  <line x1="720" y1="182" x2="720" y2="232" class="target" />
  <text x="720" y="176" class="idx">0.1</text>

  <!-- Tail bracket -->
  <path d="M 682 232 L 682 244 L 718 244 L 718 232" class="bracket" />
  <text x="700" y="266" class="label">1/256 + 1/512 + gap</text>

  <text x="400" y="316" class="caption">Binary places are worth 1/2, 1/4, 1/8, ... - each half the one before.</text>
  <text x="400" y="338" class="caption">0.1 must be a sum of these pieces; more pieces shrink the gap, but no finite sum closes it.</text>
</svg>
