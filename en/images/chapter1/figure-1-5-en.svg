<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410">
  <style>
    text { font-family: 'Courier New', 'Courier', monospace; text-anchor: middle; fill: #1a2f5e; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 14px; }
    .caption { font-size: 12px; opacity: 0.88; }

    .box { fill: #ffffff; stroke: #1a2f5e; stroke-width: 1.5; stroke-opacity: 0.5; }
    .current { fill: #1a2f5e; fill-opacity: 0.10; stroke-opacity: 0.9; stroke-width: 2.5; }
    .eliminated { stroke-opacity: 0.22; }
    .found { fill: #1a2f5e; stroke-opacity: 0; }
    .ring { fill: none; stroke: #1a2f5e; stroke-width: 1.2; stroke-opacity: 0.45; stroke-dasharray: 5 4; }
    .strike { stroke: #1a2f5e; stroke-opacity: 0.8; stroke-width: 1.6; }

    .faded { fill-opacity: 0.6; }
    .pending { fill-opacity: 0.55; }
    .midname { font-weight: bold; }
    .oncream { fill: #ffffff; font-weight: bold; }
    .frame { fill: none; stroke: #1a2f5e; stroke-opacity: 0.2; }
  </style>

  <rect width="800" height="410" fill="#ffffff" />
  <rect x="1" y="1" width="798" height="408" rx="6" class="frame" />
  <text x="400" y="34" class="title">Binary Search &#183; Step 4 (Found)</text>

