<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    text { font-family: 'Courier New', 'Courier', monospace; fill: #1a2f5e; }
    .header { font-size: 13px; font-weight: bold; text-anchor: middle; }
    .data { font-size: 13px; text-anchor: middle; }
    .caption { font-size: 12px; opacity: 0.88; }
    .frame { fill: none; stroke: #1a2f5e; stroke-opacity: 0.2; }
    .rule { stroke: #1a2f5e; stroke-opacity: 0.28; }
    .headband { fill: #1a2f5e; fill-opacity: 0.09; }
    .zebra { fill: #1a2f5e; fill-opacity: 0.05; }
  </style>

  <rect width="800" height="300" fill="#ffffff" />
  <rect x="1" y="1" width="798" height="298" rx="6" class="frame" />

  <!-- Header band -->
  <rect x="100" y="45" width="600" height="34" class="headband" />
  <text x="200" y="67" class="header">Phone Book Size</text>
  <text x="400" y="67" class="header">Linear Search</text>
  <text x="600" y="67" class="header">Binary Search</text>

  <!-- Row 1 (zebra) -->
  <rect x="100" y="79" width="600" height="34" class="zebra" />
  <text x="200" y="103" class="data">1,000 names</text>
  <text x="400" y="103" class="data">1,000 checks</text>
  <text x="600" y="103" class="data">10 checks</text>

  <!-- Row 2 (plain) -->
  <text x="200" y="135" class="data">1,000,000 names</text>
  <text x="400" y="135" class="data">1,000,000 checks</text>
  <text x="600" y="135" class="data">20 checks</text>

  <!-- Row 3 (zebra) -->
  <rect x="100" y="147" width="600" height="34" class="zebra" />
  <text x="200" y="167" class="data">8,000,000 names</text>
  <text x="400" y="167" class="data">8,000,000 checks</text>
  <text x="600" y="167" class="data">23 checks</text>

  <!-- Grid -->
  <rect x="100" y="45" width="600" height="136" class="frame" />
  <line x1="300" y1="45" x2="300" y2="181" class="rule" />
  <line x1="500" y1="45" x2="500" y2="181" class="rule" />
  <line x1="100" y1="79" x2="700" y2="79" class="rule" />
  <line x1="100" y1="113" x2="700" y2="113" class="rule" />
  <line x1="100" y1="147" x2="700" y2="147" class="rule" />

  <!-- Notes -->
  <text x="400" y="230" class="caption" text-anchor="middle">Eight times as many names adds millions of checks to linear search,</text>
  <text x="400" y="252" class="caption" text-anchor="middle">but only three more steps to binary search. That gap only widens with size.</text>
</svg>
