<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <style>
    text { font-family: sans-serif; }
    .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .header { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .data { font-size: 13px; text-anchor: middle; }
    .highlight { fill: #f0f0f0; }
    .caption { font-size: 12px; fill: #666; }
  </style>

  <rect width="800" height="280" fill="white" />

  <!-- Table Headers -->
  <rect x="100" y="40" width="600" height="30" fill="#f0f0f0" />
  <text x="200" y="60" class="header">Phone Book Size</text>
  <text x="400" y="60" class="header">Linear Search (worst case)</text>
  <text x="600" y="60" class="header">Binary Search (worst case)</text>

  <!-- Row 1 -->
  <rect x="100" y="70" width="600" height="30" fill="white" />
  <text x="200" y="90" class="data">1,000 names</text>
  <text x="400" y="90" class="data">1,000 checks</text>
  <text x="600" y="90" class="data">10 checks</text>

  <!-- Row 2 -->
  <rect x="100" y="100" width="600" height="30" fill="#f9f9f9" />
  <text x="200" y="120" class="data">1,000,000 names</text>
  <text x="400" y="120" class="data">1,000,000 checks</text>
  <text x="600" y="120" class="data">20 checks</text>

  <!-- Row 3 -->
  <rect x="100" y="130" width="600" height="30" fill="white" />
  <text x="200" y="150" class="data">8,000,000 names</text>
  <text x="400" y="150" class="data">8,000,000 checks</text>
  <text x="600" y="150" class="data">23 checks</text>

  <!-- Table Border -->
  <rect x="100" y="40" width="600" height="120" fill="none" stroke="#ddd" />
  <line x1="300" y1="40" x2="300" y2="160" stroke="#ddd" />
  <line x1="500" y1="40" x2="500" y2="160" stroke="#ddd" />
  <line x1="100" y1="70" x2="700" y2="70" stroke="#ddd" />
  <line x1="100" y1="100" x2="700" y2="100" stroke="#ddd" />
  <line x1="100" y1="130" x2="700" y2="130" stroke="#ddd" />

  <!-- Explanation Text Below Table -->
  <text x="400" y="210" class="caption" text-anchor="middle">For the 8 million name phone book, if each check takes 1 second:</text>
  <text x="400" y="230" class="caption" text-anchor="middle">- Linear search: 8 million seconds (over 3 months!)</text>
  <text x="400" y="250" class="caption" text-anchor="middle">- Binary search: 23 seconds</text>
</svg>
